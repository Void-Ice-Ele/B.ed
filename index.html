<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B.Ed College — Fee Management System</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B3A6B">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fee Manager">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --pri:#1B3A6B;--pri-l:#2a5298;--pri-d:#0f2340;
  --acc:#F5A623;--acc-d:#d4891a;--seal:#9c7a2e;
  --ok:#059669;--ok-bg:#d1fae5;
  --err:#DC2626;--err-bg:#fee2e2;
  --warn:#D97706;--warn-bg:#fef3c7;
  --inf:#0284c7;--inf-bg:#e0f2fe;
  --bg:#F1F5F9;--card:#fff;--text:#1E293B;--muted:#64748B;--bdr:#E2E8F0;
  --sw:240px;--sh:60px;--r:8px;
  --sh1:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --sh2:0 4px 6px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
  --sh3:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --serif:'Lora',Georgia,serif;--sans:'Inter',system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;min-width:0}
html{font-size:14px;scroll-behavior:smooth;overflow-x:hidden;width:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-variant-numeric:tabular-nums;overflow-x:hidden;width:100%}
.brand{font-family:var(--serif)}
svg.ic{flex-shrink:0;vertical-align:middle}

/* ── BOOT LOADER ── */
#boot-loader{position:fixed;inset:0;background:linear-gradient(135deg,var(--pri-d) 0%,var(--pri) 55%,var(--pri-l) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#fff;gap:14px}
.spinner{width:38px;height:38px;border:3px solid rgba(255,255,255,.25);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
.spinner-sm{width:15px;height:15px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.spinner-sm.dk{border:2px solid rgba(27,58,107,.2);border-top-color:var(--pri)}
@keyframes spin{to{transform:rotate(360deg)}}
#boot-loader p{font-size:.82rem;opacity:.85;letter-spacing:.02em}

/* ── LOGIN ── */
#login-page{display:none;min-height:100vh;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--pri-d) 0%,var(--pri) 55%,var(--pri-l) 100%);position:relative;overflow:hidden}
#login-page::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,.06) 1px,transparent 1px);background-size:26px 26px;pointer-events:none}
.lc{background:#fff;border-radius:16px;padding:40px 38px;width:400px;max-width:92vw;box-shadow:0 25px 60px rgba(0,0,0,.4);position:relative;z-index:1}
.lc-logo{text-align:center;margin-bottom:26px}
.monogram{width:64px;height:64px;background:linear-gradient(135deg,var(--pri),var(--pri-l));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;font-family:var(--serif);color:#fff;margin:0 auto 14px;box-shadow:0 6px 16px rgba(27,58,107,.35);border:3px solid var(--acc)}
.lc h1{font-size:1.35rem;font-weight:700;color:var(--pri);font-family:var(--serif)}
.lc .gold-rule{width:36px;height:3px;background:var(--acc);border-radius:2px;margin:8px auto}
.lc p{color:var(--muted);font-size:.78rem}

/* ── APP LAYOUT ── */
#app{display:none;min-height:100vh}
.sidebar{position:fixed;top:0;left:0;width:var(--sw);height:100vh;background:var(--pri-d);color:#fff;display:flex;flex-direction:column;z-index:100;overflow-y:auto;transition:transform .3s}
.sb-hd{padding:18px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo{display:flex;align-items:center;gap:10px}
.sb-icon{width:38px;height:38px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;font-family:var(--serif);color:var(--pri-d);flex-shrink:0}
.sb-text h2{font-size:.85rem;font-weight:700;color:#fff;line-height:1.2;font-family:var(--serif)}
.sb-text p{font-size:.66rem;color:rgba(255,255,255,.5);margin-top:2px}
.sb-nav{flex:1;padding:12px 8px}
.nav-sec{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.32);padding:12px 12px 4px;margin-top:6px}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:6px;cursor:pointer;color:rgba(255,255,255,.72);font-size:.84rem;font-weight:500;transition:all .15s;margin:1px 0}
.ni:hover{background:rgba(255,255,255,.08);color:#fff}
.ni.active{background:var(--acc);color:var(--pri-d);font-weight:700}
.ni svg{flex-shrink:0}
.sb-ft{padding:14px;border-top:1px solid rgba(255,255,255,.1)}
.u-row{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.uav{width:33px;height:33px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;color:var(--pri-d);font-weight:700;font-size:.84rem;flex-shrink:0}
.um strong{display:block;font-size:.78rem;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.um span{font-size:.68rem;color:rgba(255,255,255,.5);text-transform:capitalize}
.btn-out{width:100%;padding:8px;background:rgba(255,255,255,.08);border:none;border-radius:6px;color:rgba(255,255,255,.72);cursor:pointer;font-size:.78rem;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;font-family:inherit}
.btn-out:hover{background:rgba(220,38,38,.3);color:#fca5a5}

.main{margin-left:var(--sw);min-height:100vh;display:flex;flex-direction:column}
.topbar{height:var(--sh);background:#fff;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:50}
.topbar h1{font-size:1.05rem;font-weight:700;font-family:var(--serif);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar{gap:8px}
.sess-badge{background:var(--inf-bg);color:var(--inf);padding:4px 12px;border-radius:20px;font-size:.76rem;font-weight:700}
.pc{flex:1;padding:22px;max-width:1200px;width:100%}

/* ── CARDS ── */
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh1);overflow:hidden}
.ch{padding:14px 18px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.ct{font-size:.95rem;font-weight:700}
.cb{padding:18px}

/* ── STAT CARDS ── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.sc{background:#fff;border-radius:var(--r);padding:18px;box-shadow:var(--sh1);border-left:4px solid transparent;display:flex;align-items:center;gap:14px;transition:transform .15s,box-shadow .15s}
.sc:hover{transform:translateY(-2px);box-shadow:var(--sh2)}
.sc.bl{border-left-color:var(--pri)}.sc.gn{border-left-color:var(--ok)}.sc.or{border-left-color:var(--warn)}.sc.rd{border-left-color:var(--err)}.sc.ac{border-left-color:var(--acc)}
.si{width:46px;height:46px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc.bl .si{background:rgba(27,58,107,.1);color:var(--pri)}.sc.gn .si{background:rgba(5,150,105,.1);color:var(--ok)}.sc.or .si{background:rgba(217,119,6,.1);color:var(--warn)}.sc.rd .si{background:rgba(220,38,38,.1);color:var(--err)}.sc.ac .si{background:rgba(245,166,35,.15);color:var(--acc-d)}
.sv{font-size:1.4rem;font-weight:800;color:var(--text)}.sl{font-size:.75rem;color:var(--muted);margin-top:2px}

/* ── TABLES ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{background:var(--bg);padding:9px 13px;text-align:left;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:2px solid var(--bdr);white-space:nowrap}
td{padding:11px 13px;border-bottom:1px solid var(--bdr);font-size:.84rem;color:var(--text);vertical-align:middle}
tr:hover td{background:#f8fafc}
tr:last-child td{border-bottom:none}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap}
.b-ok{background:var(--ok-bg);color:#065f46}.b-err{background:var(--err-bg);color:#991b1b}
.b-warn{background:var(--warn-bg);color:#92400e}.b-inf{background:var(--inf-bg);color:#075985}
.b-pri{background:rgba(27,58,107,.1);color:var(--pri)}.b-gray{background:#f1f5f9;color:var(--muted)}
.b-gold{background:rgba(245,166,35,.16);color:var(--acc-d);border:1px solid rgba(245,166,35,.4)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;border-radius:6px;font-size:.84rem;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:all .15s;white-space:nowrap;font-family:inherit}
.bp{background:var(--pri);color:#fff}.bp:hover{background:var(--pri-l)}
.ba{background:var(--acc);color:var(--pri-d)}.ba:hover{background:var(--acc-d)}
.bg{background:var(--ok);color:#fff}.bg:hover{opacity:.9}
.br{background:var(--err);color:#fff}.br:hover{opacity:.9}
.bo{background:transparent;color:var(--text);border:1.5px solid var(--bdr)}.bo:hover{background:var(--bg)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.btn-sm{padding:5px 9px;font-size:.76rem}
.btn-xs{padding:3px 7px;font-size:.7rem}
.btn-icon{padding:6px;width:31px;height:31px;flex-shrink:0}
.iconbar{display:flex;gap:4px;flex-wrap:wrap}

/* ── FORMS ── */
.fg{margin-bottom:14px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
label{display:block;font-size:.78rem;font-weight:700;color:var(--text);margin-bottom:5px}
label.req::after{content:' *';color:var(--err)}
input,select,textarea{width:100%;padding:8px 11px;border:1.5px solid var(--bdr);border-radius:6px;font-size:.84rem;color:var(--text);background:#fff;transition:border-color .15s;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 3px rgba(27,58,107,.1)}
input.err,select.err{border-color:var(--err);box-shadow:0 0 0 3px rgba(220,38,38,.08)}
.emsg{font-size:.72rem;color:var(--err);margin-top:4px;display:flex;align-items:center;gap:4px}
.hint{font-size:.72rem;color:var(--muted);margin-top:4px}
textarea{resize:vertical;min-height:70px}
.check-row{display:flex;align-items:center;gap:8px;cursor:pointer;padding:9px 12px;border:1.5px solid var(--bdr);border-radius:6px;transition:all .15s;font-size:.84rem;font-weight:500}
.check-row input[type=radio]{width:auto;margin:0}
.check-row.sel{border-color:var(--pri);background:rgba(27,58,107,.05);color:var(--pri)}

/* ── MODALS ── */
.mover{position:fixed;inset:0;background:rgba(15,23,64,.55);backdrop-filter:blur(3px);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:16px;overflow-y:auto}
.modal{background:#fff;border-radius:12px;width:100%;max-width:680px;margin:auto;box-shadow:0 25px 50px rgba(0,0,0,.3);animation:slin .2s ease}
.modal-lg{max-width:860px}.modal-sm{max-width:430px}
@keyframes slin{from{transform:translateY(-14px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{padding:18px 22px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between}
.mt{font-size:1.05rem;font-weight:700;display:flex;align-items:center;gap:8px}
.mb2{padding:22px}
.mf{padding:14px 22px;border-top:1px solid var(--bdr);display:flex;justify-content:flex-end;gap:9px}
.bcl{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted);padding:4px;border-radius:4px;transition:all .15s;display:flex}
.bcl:hover{background:var(--bg);color:var(--text)}

/* ── SEARCH BAR ── */
.sinp{position:relative;flex:1;min-width:190px}
.sinp input{padding-left:34px}
.sico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);display:flex}

/* ── PHOTO ── */
.phup{width:110px;height:140px;border:2px dashed var(--bdr);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;background:var(--bg);position:relative;transition:border-color .15s;color:var(--muted)}
.phup img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.phup:hover{border-color:var(--pri)}

/* ── PROGRESS ── */
.pbar{height:8px;background:var(--bdr);border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .6s ease}

/* ── ALERTS ── */
.alert{padding:11px 14px;border-radius:6px;font-size:.84rem;display:flex;align-items:flex-start;gap:9px;margin-bottom:14px;line-height:1.5}
.a-warn{background:var(--warn-bg);color:#92400e;border:1px solid #fcd34d}
.a-err{background:var(--err-bg);color:#991b1b;border:1px solid #fca5a5}
.a-ok{background:var(--ok-bg);color:#065f46;border:1px solid #6ee7b7}
.a-inf{background:var(--inf-bg);color:#075985;border:1px solid #7dd3fc}

/* ── TABS ── */
.tabs{display:flex;gap:4px;background:var(--bg);padding:4px;border-radius:8px;margin-bottom:18px;overflow-x:auto}
.tab{flex:1;min-width:fit-content;padding:7px 14px;background:none;border:none;border-radius:5px;cursor:pointer;font-size:.82rem;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap;font-family:inherit;display:flex;align-items:center;gap:6px;justify-content:center}
.tab.active{background:#fff;color:var(--pri);font-weight:700;box-shadow:var(--sh1)}

/* ── COLLECTION BAR ── */
.cbar{background:#fff;border-radius:var(--r);padding:18px 22px;box-shadow:var(--sh1);margin-bottom:20px}

/* ── TOASTS ── */
#toast-container{position:fixed;top:16px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:8px;max-width:340px}
.toast{background:#fff;box-shadow:var(--sh2);border-radius:8px;padding:11px 13px;display:flex;align-items:flex-start;gap:9px;font-size:.83rem;cursor:pointer;animation:toastIn .25s ease;border-left:4px solid var(--inf);line-height:1.4}
.toast.t-ok{border-left-color:var(--ok)}.toast.t-error{border-left-color:var(--err)}.toast.t-warn{border-left-color:var(--warn)}.toast.t-info{border-left-color:var(--inf)}
.toast .tic{flex-shrink:0;margin-top:1px}
.toast.t-ok .tic{color:var(--ok)}.toast.t-error .tic{color:var(--err)}.toast.t-warn .tic{color:var(--warn)}.toast.t-info .tic{color:var(--inf)}
@keyframes toastIn{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{from{transform:translateX(0);opacity:1}to{transform:translateX(24px);opacity:0}}

/* ── MISC ── */
.empty{text-align:center;padding:44px 22px;color:var(--muted)}
.empty .ei{margin-bottom:12px;display:flex;justify-content:center;color:var(--bdr)}
.empty h3{font-size:.95rem;font-weight:600;color:var(--text)}
.divider{border:none;border-top:1px solid var(--bdr);margin:14px 0}
.tw-pri{color:var(--pri)}.tw-ok{color:var(--ok)}.tw-err{color:var(--err)}.tw-warn{color:var(--warn)}.tw-muted{color:var(--muted)}
.fw7{font-weight:700}.fw8{font-weight:800}.fs-sm{font-size:.76rem}
.d-flex{display:flex}.ai-c{align-items:center}.gap-2{gap:8px}.gap-3{gap:12px}.jb{justify-content:space-between}.je{justify-content:flex-end}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.st{font-size:1.05rem;font-weight:700;font-family:var(--serif)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.av{width:36px;height:36px;border-radius:50%;background:rgba(27,58,107,.1);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--pri);font-size:.84rem;flex-shrink:0}
.greet{font-family:var(--serif);font-size:1.3rem;font-weight:700;color:var(--text)}
code.sqlbox,pre.sqlbox{display:block;background:#0f2340;color:#c9d8f0;padding:14px 16px;border-radius:8px;font-size:.74rem;line-height:1.65;overflow-x:auto;white-space:pre;font-family:'SF Mono',Consolas,monospace;max-height:280px;overflow-y:auto}
.steplist{counter-reset:step;list-style:none}
.steplist li{counter-increment:step;position:relative;padding-left:30px;margin-bottom:10px;font-size:.84rem;line-height:1.55}
.steplist li::before{content:counter(step);position:absolute;left:0;top:0;width:20px;height:20px;background:var(--pri);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700}

/* ── PRINT ── */
@media print{
  body>*{display:none!important}
  #pr-receipt{display:block!important;position:fixed;top:0;left:0;width:100%;background:#fff;padding:20px}
  #pr-receipt *{visibility:visible!important}
}
#pr-receipt{display:none;padding:20px;font-family:var(--sans);background:#fff;color:#000}

/* ── RECEIPT STYLES ── */
.r-wrap{font-family:var(--sans);color:#1a1a1a;max-width:720px;margin:0 auto;background:#FFFDF9;border:1px solid #ddd0a8;border-radius:6px;padding:26px}
.r-hd{text-align:center;border-bottom:3px solid #1B3A6B;padding-bottom:14px;margin-bottom:14px}
.r-college{font-family:var(--serif);font-size:1.4rem;font-weight:700;color:#1B3A6B;text-transform:uppercase;letter-spacing:.03em}
.r-sub{font-size:.78rem;color:#555;margin-top:2px}
.r-title{background:#1B3A6B;color:#fff;text-align:center;padding:7px;font-weight:700;font-size:.88rem;letter-spacing:.12em;margin:12px 0;border-radius:3px}
.r-meta{display:flex;justify-content:space-between;font-size:.82rem;background:#f8f5ec;padding:9px 13px;border-radius:6px;margin-bottom:12px}
.r-table{width:100%;border-collapse:collapse;font-size:.82rem;margin-bottom:12px}
.r-table td{padding:5px 9px;border:1px solid #ddd}
.r-table td:first-child{background:#f0f4f8;font-weight:600;width:35%}
.r-amt{background:#f0f4f8;border:2px solid #1B3A6B;border-radius:7px;padding:13px;margin-bottom:14px;position:relative}
.r-row{display:flex;justify-content:space-between;font-size:.82rem;padding:3px 0}
.r-row.tot{border-top:2px solid #1B3A6B;margin-top:7px;padding-top:9px;font-size:1rem;font-weight:800;color:#1B3A6B}
.r-row.bal{background:#fff;padding:7px;border-radius:4px;margin-top:6px;font-weight:700}
.r-stamp{position:absolute;top:50%;right:16px;transform:rotate(-15deg) translateY(-50%);border:3px double #059669;color:#059669;font-size:1.2rem;font-weight:800;padding:5px 15px;border-radius:5px;opacity:.72;letter-spacing:.14em;font-family:var(--serif)}
.r-words{text-align:center;font-size:.76rem;color:#555;font-style:italic;margin-top:7px}
.r-sig{display:flex;justify-content:space-between;margin-top:28px;padding-top:14px;border-top:1px dashed #ccc;font-size:.76rem;text-align:center}
.r-sig-line{border-top:1px solid #333;width:130px;padding-top:5px;margin:0 auto}
.r-foot{text-align:center;font-size:.66rem;color:#aaa;margin-top:14px;border-top:1px dashed #ddd;padding-top:7px}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  :root{--sw:0px}
  .sidebar{transform:translateX(-240px);width:240px}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .fr,.fr3,.g2{grid-template-columns:1fr}
  .sgrid{grid-template-columns:repeat(2,1fr)}
  .mnu-btn{display:flex!important}
  .pc{padding:14px}
  .sess-badge{display:none}
}
@media(max-width:480px){
  .sgrid{grid-template-columns:1fr}
  .tabs{flex-direction:column}

const STU_MAP={id:'id',admissionNo:'admission_no',name:'name',fatherName:'father_name',motherName:'mother_name',mobile:'mobile',altMobile:'alt_mobile',address:'address',course:'course',session:'session',year:'year',category:'category',dateOfAdmission:'date_of_admission',dob:'dob',status:'status',totalFees:'total_fees',discount:'discount',remarks:'remarks',photo:'photo',createdAt:'created_at'};

const j2d=(obj,map)=>{const o={};for(const k in map){if(obj[k]!==undefined)o[map[k]]=obj[k]}return o};
const d2j=(row,map)=>{const o={};for(const k in map){o[k]=row[map[k]]}return o};
const toSbStudent=o=>j2d(o,STU_MAP), fromSbStudent=r=>d2j(r,STU_MAP);
const toSbPayment=o=>j2d(o,PAY_MAP), fromSbPayment=r=>d2j(r,PAY_MAP);
const toSbProfile=o=>j2d(o,PROFILE_MAP), fromSbProfile=r=>d2j(r,PROFILE_MAP);
const toSbSettings=o=>j2d(o,SET_MAP), fromSbSettings=r=>d2j(r,SET_MAP);
const toSbLog=o=>j2d(o,LOG_MAP), fromSbLog=r=>d2j(r,LOG_MAP);

function friendlySbError(err){
  const msg=(err&&err.message)||'Unknown error';const code=err&&err.code;
  if(code==='42P01'||/does not exist/i.test(msg)&&/relation/i.test(msg))return 'Required tables were not found. Please run the setup SQL in your Supabase project (see below).';
  if(code==='42703'||/column .* does not exist/i.test(msg))return 'Your database is missing a recent update. Run the small SQL snippet for Fee Structure (see Settings) in the Supabase SQL Editor, then try again.';
  if(code==='42501'||/permission denied|RLS|row-level/i.test(msg))return 'Permission denied by the database. Please re-run the setup SQL — it includes the required access grants.';
  if(/Invalid API key|JWT|apikey/i.test(msg))return 'Invalid API key. Please double-check your anon/public key.';
  if(/fetch|network|Failed to fetch|NetworkError/i.test(msg))return 'Could not reach Supabase. Check your Project URL and internet connection.';
  if(/Invalid login credentials/i.test(msg))return 'Invalid username or password.';
  if(/already registered|already exists/i.test(msg))return 'That username is already taken.';
  if(/confirm/i.test(msg))return 'Blocked by email confirmation. In Supabase go to Authentication → Providers → Email and turn OFF "Confirm email", then try again.';
  return msg;
}

async function tryInitSupabase(){
  try{
    if(typeof supabase==='undefined'){SB_READY=false;SB_LAST_ERROR='The Supabase library did not load. Check your internet connection.';return false}
    sbClient=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    // Pre-login-safe check only: confirms the SDK can reach this URL/key via the Auth
    // endpoint. It deliberately does NOT query table data — signed-out requests have
    // zero table access by design, so that's only verified once someone signs in.
    const{error}=await sbClient.auth.getSession();
    if(error)throw error;
    SB_READY=true;return true;
  }catch(err){
    console.error('Supabase connect failed',err);
    SB_LAST_ERROR=friendlySbError(err);SB_READY=false;sbClient=null;return false;
  }
}

// Loads business data. Must only run once truly authenticated — RLS returns nothing
// at all otherwise, by design.
async function loadAllData(){
  try{
    const[stR,pyR,seR,lgR,puR]=await Promise.all([
      sbClient.from('students').select('*'),
      sbClient.from('payments').select('*'),
      sbClient.from('app_settings').select('*').eq('id',1).maybeSingle(),
      sbClient.from('audit_log').select('*').order('ts',{ascending:false}).limit(500),
      sbClient.from('profiles').select('*')
    ]);
    if(stR.error)throw stR.error;if(pyR.error)throw pyR.error;
    DB.students=(stR.data||[]).map(fromSbStudent);
    DB.payments=(pyR.data||[]).map(fromSbPayment);
    DB.settings=seR.data?fromSbSettings(seR.data):null;
    DB.log=(lgR.error?[]:(lgR.data||[])).map(fromSbLog);
    DB.users=(puR.error?[]:(puR.data||[])).map(fromSbProfile);
    if(!DB.settings){DB.settings=defaultSettings();try{await dbSaveSettings(DB.settings)}catch(e){}}
  }catch(err){
    console.error(err);SB_LAST_ERROR=friendlySbError(err);
    showToast('Could not load your data: '+friendlySbError(err),'error',6000);
  }
}

// ── CRUD wrappers: every mutation goes straight to Supabase, then updates the in-memory cache ──
async function dbAddStudent(obj){
  const{error}=await sbClient.from('students').insert(toSbStudent(obj));if(error)throw error;
  DB.students.push(obj);
}
async function dbUpdateStudent(id,obj){
  const{error}=await sbClient.from('students').update(toSbStudent(obj)).eq('id',id);if(error)throw error;
  const i=DB.students.findIndex(s=>s.id===id);if(i>-1)DB.students[i]=obj;
}
async function dbDeleteStudent(id){
  await sbClient.from('payments').delete().eq('student_id',id);
  const{error}=await sbClient.from('students').delete().eq('id',id);if(error)throw error;
  DB.students=DB.students.filter(s=>s.id!==id);DB.payments=DB.payments.filter(p=>p.studentId!==id);
}
async function dbBulkAddStudents(arr){
  if(!arr||!arr.length)return;
  const{error}=await sbClient.from('students').insert(arr.map(toSbStudent));if(error)throw error;
  DB.students=[...DB.students,...arr];
}
async function dbAddPayment(obj){
  const{error}=await sbClient.from('payments').insert(toSbPayment(obj));if(error)throw error;
  DB.payments.push(obj);
}
async function dbDeletePayment(id){
  const{error}=await sbClient.from('payments').delete().eq('id',id);if(error)throw error;

async function dbSaveSettings(obj){
  const row=Object.assign({id:1},toSbSettings(obj));
  const{error}=await sbClient.from('app_settings').upsert(row,{onConflict:'id'});if(error)throw error;

async function dbAddLog(entry){

async function bulkUpsert(table,rows,map){
  if(!rows||!rows.length)return;
  const{error}=await sbClient.from(table).upsert(rows.map(r=>j2d(r,map)),{onConflict:'id'});
  if(error)throw error;
}

// Accounts are created directly in Supabase (Authentication -> Users), not by this app.
// The first time that person successfully signs in here, we create their profile row —
// the database trigger decides admin-vs-staff (first ever = admin, everyone else starts
// as unapproved staff until a real admin approves them on the Users page).
async function createOwnProfileIfMissing(email,uid){
  let username=(email.split('@')[0]||'user').toLowerCase().replace(/[^a-z0-9._-]/g,'').slice(0,28)||'user';
  let{error}=await sbClient.from('profiles').insert({id:uid,username,name:username,role:'staff'});
  if(error&&/unique|duplicate/i.test(error.message||'')){
    username=username+uid.slice(0,4);

// ID GENERATION — derived from current data, collision-checked at save time
// ══════════════════════════════════════════════════════════════
function seqFromIds(ids,prefix){
  let max=0;
  ids.forEach(id=>{
    if(typeof id==='string'&&id.startsWith(prefix)){
      const n=parseInt(id.slice(prefix.length),10);
      if(!isNaN(n)&&n>max)max=n;
    }
  });
  return max+1;
}
function autoSid(){
  const se=gSe();const yr=(se.currentSession||'2024-2025').split('-')[0].slice(-2);const prefix='STU'+yr;
  return prefix+String(seqFromIds(gSt().map(s=>s.id),prefix)).padStart(3,'0');
}
function nextRcp(){
  const se=gSe();const yr=(se.currentSession||'2024-2025').replace('-','').slice(-4);const prefix='RCP'+yr;
  return prefix+String(seqFromIds(gPy().map(p=>p.receiptNo),prefix)).padStart(4,'0');
}
function nextId(pfx){
  let ids=[];
  if(pfx==='STU')ids=gSt().map(s=>s.id);else if(pfx==='PAY')ids=gPy().map(p=>p.id);else if(pfx==='USR')ids=gUs().map(u=>u.id);
  return pfx+String(seqFromIds(ids,pfx)).padStart(4,'0');
}

const fmtD=d=>{if(!d)return'-';const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric'})};
const fmtDT=d=>{if(!d)return'-';const dt=new Date(d);if(isNaN(dt))return d;return dt.toLocaleString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})};
const fmtC=n=>'₹'+(parseFloat(n)||0).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2});
const today=()=>new Date().toISOString().split('T')[0];
const nextSessionStr=session=>{const m=(session||'').match(/^(\d{4})-(\d{4})$/);return m?`${+m[1]+1}-${+m[2]+1}`:session};
const e=id=>document.getElementById(id);
const esc=s=>(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function greeting(){const h=new Date().getHours();return h<12?'Good morning':h<17?'Good afternoon':'Good evening'}

const n2w=n=>{const ones=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];const tens=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];const cv=n=>{if(n<20)return ones[n];if(n<100)return tens[Math.floor(n/10)]+(n%10?' '+ones[n%10]:'');if(n<1000)return ones[Math.floor(n/100)]+' Hundred'+(n%100?' '+cv(n%100):'');if(n<100000)return cv(Math.floor(n/1000))+' Thousand'+(n%1000?' '+cv(n%1000):'');if(n<10000000)return cv(Math.floor(n/100000))+' Lakh'+(n%100000?' '+cv(n%100000):'');return cv(Math.floor(n/10000000))+' Crore'+(n%10000000?' '+cv(n%10000000):'')};const num=Math.floor(parseFloat(n)||0);return num===0?'Zero Rupees Only':cv(num)+' Rupees Only'};

const netFees=st=>Math.max(0,(parseFloat(st.totalFees)||0)-(parseFloat(st.discount)||0));
const paidTotal=(sid,sess)=>gPy().filter(p=>p.studentId===sid&&(!sess||p.session===sess)).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
const balance=sid=>{const st=gSt().find(s=>s.id===sid);if(!st)return 0;return Math.max(0,netFees(st)-paidTotal(sid))};
const txnUsed=(txn,excl)=>{if(!txn||!txn.trim())return false;return gPy().some(p=>p.id!==excl&&p.transactionId&&p.transactionId.toLowerCase()===txn.trim().toLowerCase())};

const avatarEl=st=>{if(st.photo)return`<img src="${st.photo}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;flex-shrink:0">`;const ini=(st.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);return`<div class="av">${ini}</div>`};

const csvDl=(rows,fname)=>{const csv=rows.map(r=>r.map(c=>`"${(c||'').toString().replace(/"/g,'""')}"`).join(',')).join('\n');const b=new Blob([csv],{type:'text/csv'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=fname;a.click();URL.revokeObjectURL(u)};

function showToast(msg,type,duration){
  type=type||'info';duration=duration||3800;
  const id='t'+Date.now()+Math.random().toString(36).slice(2,6);
  const ic={ok:'check',error:'x',warn:'alert',info:'bell'}[type]||'bell';
  const el=document.createElement('div');el.id=id;el.className='toast t-'+type;
  el.innerHTML=`<span class="tic">${icon(ic,16)}</span><span style="flex:1">${esc(msg)}</span>`;
  el.onclick=()=>dismissToast(id);
  const cont=e('toast-container');if(cont){cont.appendChild(el);setTimeout(()=>dismissToast(id),duration)}
}
function dismissToast(id){const el=document.getElementById(id);if(!el)return;el.style.animation='toastOut .2s ease forwards';setTimeout(()=>el.remove(),200)}

function askConfirm(opts){
  opts=opts||{};
  return new Promise(resolve=>{
    const danger=opts.danger;
    showModal('confirm-modal',`
      <div class="mh"><span class="mt">${danger?icon('alert',18):''}${esc(opts.title||'Please Confirm')}</span></div>
      <div class="mb2"><p style="font-size:.88rem;line-height:1.6;white-space:pre-line">${esc(opts.message||'')}</p>
        ${opts.requireText?`<div class="fg" style="margin-top:14px"><label>Type <strong>${esc(opts.requireText)}</strong> to confirm</label><input type="text" id="confirm-inp" placeholder="Type here..."></div>`:''}
      </div>
      <div class="mf">
        <button class="btn bo" id="confirm-cancel">${esc(opts.cancelLabel||'Cancel')}</button>
        <button class="btn ${danger?'br':'bp'}" id="confirm-ok">${esc(opts.confirmLabel||'Confirm')}</button>
      </div>`,'modal-sm');
    e('confirm-cancel').onclick=()=>{closeM();resolve(false)};
    e('confirm-ok').onclick=()=>{
      if(opts.requireText){
        const v=(e('confirm-inp').value||'').trim();
        if(v!==opts.requireText){showToast('Text did not match — cancelled for safety.','error');closeM();resolve(false);return}
      }
      closeM();resolve(true);
    };
  });
}

function setBusy(btnId,busy,busyLabel){
  const b=e(btnId);if(!b)return;

}

async function doLogin(){
  const u=e('lu').value.trim(),p=e('lp').value;const er=e('lerr');
  er.style.display='none';
  if(!u||!p){er.textContent='Please enter your email and password.';er.style.display='flex';return}
  setBusy('login-btn',true,'Logging in...');
  try{
    const{data:signInData,error}=await sbClient.auth.signInWithPassword({email:u,password:p});
    if(error){er.textContent=friendlySbError(error);er.style.display='flex';setBusy('login-btn',false);return}
    let prof=await fetchOwnProfile();
    if(!prof){
      // first time this Supabase-created account has ever logged in — set up its profile now
      await createOwnProfileIfMissing(u,signInData.user.id);
      prof=await fetchOwnProfile();
    }
    if(!prof){await sbClient.auth.signOut();er.textContent='Could not set up your account. Please re-run the setup SQL, then try again.';er.style.display='flex';setBusy('login-btn',false);return}
    if(!prof.approved){await sbClient.auth.signOut();er.textContent='Your account is set up but still waiting for an administrator to approve it from the Users page.';er.style.display='flex';setBusy('login-btn',false);return}
    S.user=prof;
    await loadAllData();
    addLog('LOGIN',`${prof.name} logged in`);
    setBusy('login-btn',false);
    showApp();
  }catch(err){
    setBusy('login-btn',false);er.textContent=friendlySbError(err);er.style.display='flex';
  }
}

async function doLogout(){
  const ok=await askConfirm({title:'Logout',message:'Are you sure you want to logout?',confirmLabel:'Logout'});
  if(!ok)return;
  addLog('LOGOUT',`${S.user?S.user.name:''} logged out`);
  if(sbClient)await sbClient.auth.signOut();
  S.user=null;
  e('app').style.display='none';e('login-page').style.display='flex';
  e('lu').value='';e('lp').value='';e('lerr').style.display='none';
}

async function checkExistingSession(){
  try{
    const{data}=await sbClient.auth.getSession();
    if(!data||!data.session)return false;
    let prof=await fetchOwnProfile();
    if(!prof){
      await createOwnProfileIfMissing(data.session.user.email,data.session.user.id);
      prof=await fetchOwnProfile();
    }
    if(!prof||!prof.approved){await sbClient.auth.signOut();return false}
    S.user=prof;await loadAllData();return true;
  }catch(err){console.error(err);return false}
}

async function delStu(id){
  const s=gSt().find(x=>x.id===id);if(!s)return;
  const pys=gPy().filter(p=>p.studentId===id);
  const ok=await askConfirm({
    title:'Delete Student',danger:true,confirmLabel:'Delete',
    message:pys.length?`Deleting "${s.name}" will also permanently erase ${pys.length} payment record(s) linked to them.`:`Delete "${s.name}"? This cannot be undone.`,
    requireText:pys.length?s.name:null
  });
  if(!ok)return;
  try{
    await dbDeleteStudent(id);addLog('DEL_STU',`Deleted ${s.name} (${id})`);
    showToast(`Student "${s.name}" deleted.`,'ok');rStudents();
  }catch(err){showToast('Delete failed: '+friendlySbError(err),'error')}
}

// Looks up a configured fee-structure price for the selected Course + Session + Year and
// suggests it in the Total Fees field (new students only — never touches an existing one).
function onFeeCtxChange(){
  const fld=e('f-fees'),hint=e('fee-auto-hint');
  if(!fld||!hint)return;
  const course=e('f-crs').value,session=e('f-sess').value,year=e('f-yr').value;
  const fs=(gSe().feeStructures||[]).find(x=>x.course===course&&x.session===session);
  if(!fs){hint.style.display='none';return}
  const amt=year==='1st Year'?fs.year1Fee:year==='2nd Year'?fs.year2Fee:fs.fullCourseFee;
  if(amt>0){
    fld.value=amt;
    hint.style.display='block';
    hint.textContent=`Auto-filled from your Fee Structure for ${esc(course)} · ${esc(session)}. You can still change it.`;
  }else{
    hint.style.display='none';
  }
}

function rEditStudent(){const s=gSt().find(x=>x.id===S.editSid);if(!s){nav('students');return}rAddStudent(s)}

function handlePhoto(inp){
  const f=inp.files[0];if(!f)return;
  if(f.size>2097152){showToast('Photo must be under 2MB.','error');return}
  const r=new FileReader();r.onload=ev=>{S.photoB64=ev.target.result;e('ph-area').innerHTML=`<img src="${S.photoB64}" alt="photo">`};r.readAsDataURL(f);
}

function collectStuForm(){
  const id=e('f-id').value.trim();const name=e('f-name').value.trim();const dad=e('f-dad').value.trim();const fees=e('f-fees').value;

// ── Promote to Next Year ──
// Fees ACCUMULATE onto the student's existing total rather than replacing it. Since the
// balance is always (total fees so far − everything ever paid), any overpayment from 1st
// year automatically reduces what shows as due in 2nd year — no separate credit tracking needed.
function showPromoteModal(sid){
  const s=gSt().find(x=>x.id===sid);if(!s)return;
  const ns=nextSessionStr(s.session);
  const fs=(gSe().feeStructures||[]).find(x=>x.course===s.course&&x.session===ns);
  const suggested=fs?fs.year2Fee:0;
  showModal('promo-modal',`
    <div class="mh"><span class="mt">${icon('arrowRight',18)} Promote to Next Year</span><button class="bcl" onclick="closeM()">${icon('x',18)}</button></div>
    <div class="mb2">
      <div class="alert a-inf">${icon('bell',15)}<span><strong>${esc(s.name)}</strong> moves from <strong>1st Year, ${esc(s.session)}</strong> to <strong>2nd Year, ${esc(ns)}</strong>. Their payment history stays exactly as it is.</span></div>
      <div class="fg"><label class="req">2nd Year Fee (₹)</label><input type="number" id="promo-fee" value="${suggested||''}" min="0" step="100" oninput="updatePromoPreview('${sid}')">
        <p class="hint">${fs?`Filled in from your Fee Structure for ${esc(s.course)} · ${esc(ns)}.`:`No Fee Structure found for ${esc(s.course)} · ${esc(ns)} — enter the amount manually, or set one up in Settings first.`}</p>
      </div>
      <div class="fg"><label>Extra Discount for 2nd Year (₹)</label><input type="number" id="promo-disc" value="0" min="0" step="100" oninput="updatePromoPreview('${sid}')"></div>
      <div class="alert a-ok" id="promo-preview" style="margin-top:4px"></div>
      <div id="promo-err" class="alert a-err" style="display:none"></div>
    </div>
    <div class="mf"><button class="btn bo" onclick="closeM()">Cancel</button><button class="btn ba" id="promo-save-btn" onclick="doPromote('${sid}')">Promote</button></div>
  `,'modal-sm');
  updatePromoPreview(sid);
}

function updatePromoPreview(sid){
  const s=gSt().find(x=>x.id===sid);if(!s)return;
  const prev=e('promo-preview');if(!prev)return;
  const addFee=parseFloat(e('promo-fee').value)||0,addDisc=parseFloat(e('promo-disc').value)||0;
  const newTotal=(parseFloat(s.totalFees)||0)+addFee,newDiscount=(parseFloat(s.discount)||0)+addDisc;
  const paid=paidTotal(sid);const newBalance=Math.max(0,newTotal-newDiscount-paid);
  prev.innerHTML=`After promotion — Total Fees: <strong>${fmtC(newTotal)}</strong> · Already Paid (carried forward): <strong>${fmtC(paid)}</strong> · New Balance: <strong>${newBalance>0?fmtC(newBalance):'₹0 (fully covered)'}</strong>`;
}

async function doPromote(sid){
  const s=gSt().find(x=>x.id===sid);if(!s)return;
  const addFee=parseFloat(e('promo-fee').value)||0,addDisc=parseFloat(e('promo-disc').value)||0;
  const er=e('promo-err');er.style.display='none';
  if(addFee<=0){er.textContent='Please enter the 2nd year fee amount.';er.style.display='flex';return}
  const ns=nextSessionStr(s.session);
  const updated=Object.assign({},s,{year:'2nd Year',session:ns,totalFees:(parseFloat(s.totalFees)||0)+addFee,discount:(parseFloat(s.discount)||0)+addDisc});
  setBusy('promo-save-btn',true);
  try{
    await dbUpdateStudent(sid,updated);
    addLog('PROMOTE',`${s.name} promoted to 2nd Year, ${ns}`);
    showToast(`${s.name} promoted to 2nd Year!`,'ok');
    closeM();S.viewSid=sid;nav('student-detail');
  }catch(err){setBusy('promo-save-btn',false);er.textContent=friendlySbError(err);er.style.display='flex'}
}

function rPayments(){
  const se=gSe();let pys=gPy();const sts=gSt();
  if(S.pSess&&S.pSess!=='all')pys=pys.filter(p=>p.session===S.pSess);
  if(S.pMode!=='all')pys=pys.filter(p=>p.paymentMode===S.pMode);
  if(S.pFrom)pys=pys.filter(p=>p.paymentDate>=S.pFrom);
  if(S.pTo)pys=pys.filter(p=>p.paymentDate<=S.pTo);
  if(S.pSrch){const q=S.pSrch.toLowerCase();const stMap={};sts.forEach(s=>stMap[s.id]=s);pys=pys.filter(p=>(p.receiptNo||'').toLowerCase().includes(q)||((stMap[p.studentId]&&stMap[p.studentId].name)||'').toLowerCase().includes(q)||(p.studentId||'').toLowerCase().includes(q)||(p.transactionId||'').toLowerCase().includes(q))}
  pys=pys.slice().sort((a,b)=>new Date(b.createdAt||b.paymentDate)-new Date(a.createdAt||a.paymentDate));
  window._fPys=pys;
  const tot=pys.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const stMap={};sts.forEach(s=>stMap[s.id]=s);
  const rows=pys.map(p=>{const s=stMap[p.studentId];return`<tr>
    <td class="fw7 tw-pri">${esc(p.receiptNo)}</td>
    <td>${fmtD(p.paymentDate)}</td>
    <td><div style="display:flex;align-items:center;gap:7px">${s?avatarEl(s):''}<div><div class="fw7">${esc(s?s.name:'Unknown')}</div><div class="fs-sm tw-muted">${esc(p.studentId)}</div></div></div></td>
    <td>${esc(p.feeHead||'-')}</td>

function expPayCSV(){
  const sts=gSt();const stMap={};sts.forEach(s=>stMap[s.id]=s);
  const hdr=['Receipt No','Date','Student ID','Student Name','Fee Head','Installment','Mode','Txn ID / Rcvd By','Amount','Remarks','Collected By','Session'];
  const rows=(window._fPys||gPy()).map(p=>[p.receiptNo,p.paymentDate,p.studentId,(stMap[p.studentId]&&stMap[p.studentId].name)||'',p.feeHead,p.installment,p.paymentMode,p.transactionId||p.toWhom||'',p.amount,p.remarks,p.collectedBy,p.session]);
  csvDl([hdr,...rows],'payments_export.csv');showToast('Payments exported.','ok');
}

async function delPay(id,from){
  const p=gPy().find(x=>x.id===id);if(!p)return;
  const ok=await askConfirm({title:'Delete Payment',danger:true,confirmLabel:'Delete',message:`Delete receipt ${p.receiptNo} (${fmtC(p.amount)})? This cannot be undone.`});
  if(!ok)return;
  try{
    await dbDeletePayment(id);addLog('DEL_PAY',`Deleted ${p.receiptNo}`);
    showToast('Payment deleted.','ok');
    if(from==='detail')rStudentDetail();else rPayments();
  }catch(err){showToast('Delete failed: '+friendlySbError(err),'error')}
}

// ══════════════════════════════════════════════════════════════

  if(S.user.role!=='admin'){e('pc').innerHTML=`<div class="empty"><div class="ei">${icon('lock',44,1.5)}</div><h3>Access Denied</h3><p>Only administrators can record payments. You can still view and print receipts.</p></div>`;return}

  <div style="max-width:700px"><div class="card">

    <div id="pay-stu-info"></div>

    </div>

      <div class="fg"><label class="req">Payment Date</label><input type="date" id="py-dt" value="${today()}"></div>

function selMode(m){
  PMODES.forEach(x=>{const lbl=e('ml-'+x.replace(' ','-'));if(lbl){lbl.classList.toggle('sel',x===m);lbl.querySelector('input').checked=(x===m)}});
  onModeChg();
}

function onModeChg(){
  const sel=document.querySelector('input[name="pymode"]:checked');const m=sel?sel.value:'Cash';
  const ex=e('py-extra');if(!ex)return;
  if(m==='Cash'){
    ex.innerHTML=`<div class="fr">
      <div class="fg"><label class="req">Received By (Name)</label><input type="text" id="py-towho" value="${esc((S.user&&S.user.name)||'')}" placeholder="Who physically received the cash?"></div>
      <div class="fg"><label>Change Returned to Student (₹)</label><input type="number" id="py-chng" placeholder="0 if none" min="0"></div>
    </div>`;
  }else{
    const lb={'UPI':'UPI Transaction ID','Bank Transfer':'Bank Txn / NEFT / IMPS Reference No','Cheque':'Cheque Number'}[m]||'Transaction ID';
    const ph={'UPI':'e.g. UPI123456789012','Bank Transfer':'e.g. NEFT/IMPS reference no','Cheque':'e.g. 001234 (6-digit cheque no)'}[m]||'Enter ID';
    ex.innerHTML=`<div class="fg"><label class="req">${lb}</label>
      <input type="text" id="py-txn" placeholder="${ph}" onblur="chkTxn(this)" oninput="e('txn-err').style.display='none';this.classList.remove('err')">
      <div id="txn-err" class="emsg" style="display:none">${icon('alert',13)} This transaction ID is already used in another payment! Please verify.</div>
    </div>`;
  }
}

function chkTxn(inp){
  const v=inp.value.trim();const er=e('txn-err');if(!er)return;
  if(v&&txnUsed(v)){inp.classList.add('err');er.style.display='flex'}else{inp.classList.remove('err');er.style.display='none'}
}

function onStuChg(){
  const sid=e('py-stu').value;const inf=e('pay-stu-info');const bal=e('pay-bal-info');
  if(!sid){if(inf)inf.innerHTML='';if(bal)bal.innerHTML='';return}
  const s=gSt().find(x=>x.id===sid);if(!s)return;
  const nf=netFees(s);const pd=paidTotal(sid);const bl=Math.max(0,nf-pd);
  if(inf)inf.innerHTML=`<div class="alert a-inf" style="margin-bottom:12px"><div style="display:flex;gap:14px;flex-wrap:wrap;font-size:.84rem">
    <div><strong>${esc(s.name)}</strong></div>
    <div>${esc(s.course)} · ${esc(s.session)}</div>
    <div>Net Fees: <strong>${fmtC(nf)}</strong></div>
    <div>Paid: <strong class="tw-ok">${fmtC(pd)}</strong></div>
    <div>Balance: <strong class="${bl>0?'tw-err':'tw-ok'}">${bl>0?fmtC(bl):'Fully Paid'}</strong></div>
  </div></div>`;
  if(bal)bal.innerHTML=bl>0?`<div class="alert a-warn">Pending due: <strong>${fmtC(bl)}</strong> — make sure to collect the correct amount.</div>`:`<div class="alert a-ok">Student has no pending dues as of now.</div>`;
}

async function svPayment(){
  const sid=e('py-stu').value;const dt=e('py-dt').value;const amt=parseFloat(e('py-amt').value);
  const fh=e('py-fh').value;const inst=e('py-inst').value;const by=e('py-by').value.trim();const sess=e('py-sess').value;const rem=e('py-rem').value.trim();
  const selm=document.querySelector('input[name="pymode"]:checked');const m=selm?selm.value:'Cash';
  if(!sid){showToast('Please select a student.','error');return}
  if(!dt){showToast('Please enter payment date.','error');return}
  if(!amt||amt<=0){showToast('Please enter a valid amount.','error');return}
  if(!by){showToast('Please enter who collected the payment.','error');return}
  let txn='',toWho='',chng=0;
  if(m==='Cash'){
    toWho=((e('py-towho')&&e('py-towho').value)||'').trim();if(!toWho){showToast('Please enter who received the cash.','error');return}
    chng=parseFloat((e('py-chng')&&e('py-chng').value)||0)||0;
  }else{
    txn=((e('py-txn')&&e('py-txn').value)||'').trim();if(!txn){showToast('Please enter the transaction ID.','error');return}
    if(txnUsed(txn)){showToast('This transaction ID already exists. Please check and re-enter.','error');return}
  }
  const s=gSt().find(x=>x.id===sid);if(!s){showToast('Student not found.','error');return}
  const rno=nextRcp();const pid=nextId('PAY');
  const pay={id:pid,receiptNo:rno,studentId:sid,studentName:s.name,paymentDate:dt,amount:amt,feeHead:fh,installment:inst,paymentMode:m,transactionId:txn,toWhom:toWho,changeReturned:chng,collectedBy:by,session:sess,remarks:rem,createdAt:new Date().toISOString(),createdBy:(S.user&&S.user.name)||''};
  setBusy('pay-save-btn',true);
  try{
    await dbAddPayment(pay);addLog('ADD_PAY',`${rno} for ${s.name} – ${fmtC(amt)}`);
    nav('payments');setTimeout(()=>viewRcp(pid),150);
  }catch(err){setBusy('pay-save-btn',false);showToast('Save failed: '+friendlySbError(err),'error')}
}

    <tr><td>Payment Mode</td><td colspan="3">${esc(p.paymentMode)}${p.transactionId?' | Txn ID: '+esc(p.transactionId):''}${p.toWhom?' | Received By: '+esc(p.toWhom):''}${p.changeReturned>0?' | Change Returned: '+fmtC(p.changeReturned):''}</td></tr>

    <div class="r-row"><span>Previously Paid</span><span>${fmtC(prevPd)}</span></div>

function printRcp(pid){
  const p=gPy().find(x=>x.id===pid);if(!p)return;
  const s=gSt().find(x=>x.id===p.studentId);if(!s)return;
  const se=gSe();const nf=netFees(s);const pd=paidTotal(s.id);const bl=Math.max(0,nf-pd);const prevPd=pd-p.amount;const prevBl=Math.max(0,nf-prevPd);

function rRptMonthly(){
  const se=gSe();const pys=gPy().filter(p=>p.session===se.currentSession);
  const mo={};
  pys.forEach(p=>{const m=(p.paymentDate||'').slice(0,7)||'Unknown';if(!mo[m])mo[m]={t:0,n:0,c:0,u:0,b:0,ch:0};mo[m].t+=parseFloat(p.amount)||0;mo[m].n++;if(p.paymentMode==='Cash')mo[m].c+=parseFloat(p.amount)||0;else if(p.paymentMode==='UPI')mo[m].u+=parseFloat(p.amount)||0;else if(p.paymentMode==='Bank Transfer')mo[m].b+=parseFloat(p.amount)||0;else if(p.paymentMode==='Cheque')mo[m].ch+=parseFloat(p.amount)||0});
  window._mo=mo;
  const tot=pys.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);
  const rows=Object.keys(mo).sort().reverse().map(m=>{const d=mo[m];const parts=m.split('-');const mn2=new Date(+parts[0],+parts[1]-1).toLocaleString('en-IN',{month:'long',year:'numeric'});return`<tr><td class="fw7">${mn2}</td><td>${d.n}</td><td>${fmtC(d.c)}</td><td>${fmtC(d.u)}</td><td>${fmtC(d.b)}</td><td>${fmtC(d.ch)}</td><td class="fw7 tw-ok">${fmtC(d.t)}</td></tr>`}).join('')||noData(7);
  e('rc').innerHTML=`

function expLedCSV(sid){const s=gSt().find(x=>x.id===sid);if(!s)return;const pys=gPy().filter(p=>p.studentId===sid).sort((a,b)=>new Date(a.paymentDate)-new Date(b.paymentDate));const nf=netFees(s);let run=0;const hdr=['Date','Receipt No','Fee Head','Installment','Mode','Amount','Cumulative Paid','Balance'];const rows=pys.map(p=>{run+=parseFloat(p.amount)||0;return[p.paymentDate,p.receiptNo,p.feeHead,p.installment,p.paymentMode,p.amount,run.toFixed(2),Math.max(0,nf-run).toFixed(2)]});csvDl([hdr,...rows],`ledger_${s.name.replace(/\s+/g,'_')}.csv`)}

function rRptSummary(){
  const se=gSe();const sess=se.currentSession;
  const sts=gSt();const pys=gPy();const ssts=sts.filter(s=>s.session===sess);const spys=pys.filter(p=>p.session===sess);
  const tF=ssts.reduce((s,x)=>s+netFees(x),0);const tC=spys.reduce((s,p)=>s+(parseFloat(p.amount)||0),0);const tD=Math.max(0,tF-tC);
  const byH={},byM={},byCat={};
  spys.forEach(p=>{const h=p.feeHead||'Other';byH[h]=(byH[h]||0)+(parseFloat(p.amount)||0);const m=p.paymentMode||'Unknown';byM[m]=(byM[m]||0)+(parseFloat(p.amount)||0)});
  ssts.forEach(s=>{const c=s.category||'Other';if(!byCat[c])byCat[c]={n:0,f:0,p:0};byCat[c].n++;byCat[c].f+=netFees(s);byCat[c].p+=paidTotal(s.id)});
  const hRows=Object.entries(byH).sort((a,b)=>b[1]-a[1]).map(x=>`<tr><td>${x[0]}</td><td class="fw7 tw-ok">${fmtC(x[1])}</td><td>${tC>0?Math.round(x[1]/tC*100):0}%</td></tr>`).join('')||noData(3);
  const mRows=Object.entries(byM).map(x=>`<tr><td><span class="badge ${x[0]==='Cash'?'b-ok':'b-inf'}">${x[0]}</span></td><td class="fw7 tw-ok">${fmtC(x[1])}</td><td>${tC>0?Math.round(x[1]/tC*100):0}%</td></tr>`).join('')||noData(3);
  const cRows=Object.entries(byCat).map(x=>{const c=x[0],d=x[1];return`<tr><td>${c}</td><td>${d.n}</td><td>${fmtC(d.f)}</td><td class="tw-ok fw7">${fmtC(d.p)}</td><td class="${d.f-d.p>0?'tw-err':'tw-ok'} fw7">${d.f-d.p>0?fmtC(d.f-d.p):'₹0'}</td></tr>`}).join('')||noData(5);
  e('rc').innerHTML=`
  <div class="sgrid" style="margin-bottom:18px">
    <div class="sc bl"><div class="si">${icon('users',22)}</div><div><div class="sv">${ssts.length}</div><div class="sl">Students (${sess})</div></div></div>
    <div class="sc gn"><div class="si">${icon('wallet',22)}</div><div><div class="sv">${fmtC(tC)}</div><div class="sl">Total Collected</div></div></div>
    <div class="sc rd"><div class="si">${icon('alert',22)}</div><div><div class="sv">${fmtC(tD)}</div><div class="sl">Total Pending</div></div></div>
    <div class="sc or"><div class="si">${icon('receipt',22)}</div><div><div class="sv">${spys.length}</div><div class="sl">Transactions</div></div></div>
  </div>
  <div class="g2">
    <div class="card"><div class="ch"><span class="ct">Collection by Fee Head</span></div><div class="tw"><table><thead><tr><th>Fee Head</th><th>Amount</th><th>Share</th></tr></thead><tbody>${hRows}</tbody></table></div></div>
    <div class="card"><div class="ch"><span class="ct">Collection by Payment Mode</span></div><div class="tw"><table><thead><tr><th>Mode</th><th>Amount</th><th>Share</th></tr></thead><tbody>${mRows}</tbody></table></div></div>
  </div>
  <div class="card" style="margin-top:16px"><div class="ch"><span class="ct">Category-wise Summary</span></div><div class="tw"><table><thead><tr><th>Category</th><th>Students</th><th>Net Fees</th><th>Collected</th><th>Pending</th></tr></thead><tbody>${cRows}</tbody></table></div></div>`;
}

    </div></td>
  </tr>`}).join('');
  e('pc').innerHTML=`
  <div class="sh"><span class="st">User Management</span></div>
  <div class="alert a-inf">${icon('bell',15)}<span>To add someone new, create them in Supabase under <strong>Authentication → Users → Add User</strong> (tick <strong>Auto Confirm User</strong>) and give them that email + password. The first time they log into this app, they'll show up below automatically — approve them here if they're not an admin already.</span></div>

async function approveUser(uid){
  try{
    await dbApproveUser(uid);addLog('APPROVE_USR',`Approved user ${uid}`);
    showToast('User approved.','ok');rUsers();
  }catch(err){showToast('Approve failed: '+friendlySbError(err),'error')}
}

function showUModal(uid){
  const u=gUs().find(x=>x.id===uid);if(!u)return;
  showModal('u-modal',`
    <div class="mh"><span class="mt">Edit User</span><button class="bcl" onclick="closeM()">${icon('x',18)}</button></div>
    <div class="mb2">
      <div class="fg"><label class="req">Full Name</label><input type="text" id="u-nm" value="${esc(u.name||'')}"></div>
      <div class="fg"><label class="req">Role</label><select id="u-rl"><option value="staff" ${u.role==='staff'?'selected':''}>Staff (Office)</option><option value="admin" ${u.role==='admin'?'selected':''}>Admin (Full Access)</option></select></div>
      <p class="hint">Email and password are managed in Supabase, not here. Password changes are self-service — the user can change their own from the sidebar once logged in.</p>
      <div id="u-err" class="alert a-err" style="display:none"></div>
    </div>
    <div class="mf"><button class="btn bo" onclick="closeM()">Cancel</button><button class="btn bp" id="user-save-btn" onclick="svEditUser('${uid}')">Save</button></div>
  `,'modal-sm');
}

async function svEditUser(uid){
  const nm=e('u-nm').value.trim(),rl=e('u-rl').value;
  const er=e('u-err');er.style.display='none';
  if(!nm){er.textContent='Please enter a name.';er.style.display='flex';return}
  setBusy('user-save-btn',true);
  try{
    await dbUpdateUserName(uid,nm);await dbUpdateUserRole(uid,rl);
    addLog('EDIT_USR',`Edited user ${nm}`);
    showToast('User updated.','ok');closeM();rUsers();
  }catch(err){setBusy('user-save-btn',false);er.textContent=friendlySbError(err);er.style.display='flex'}
}

async function delUser(uid){
  if(uid===S.user.id){showToast('Cannot delete your own account.','error');return}
  const u=gUs().find(x=>x.id===uid);
  const ok=await askConfirm({title:'Revoke Access',danger:true,confirmLabel:'Revoke Access',message:`Remove "${u?u.name:''}" from this app? They will immediately lose access to all data. (This removes their profile; to fully delete their login from Supabase too, do that once from your Supabase dashboard.)`});
  if(!ok)return;
  try{
    await dbDeleteUser(uid);addLog('DEL_USR',`Removed user ${u?u.name:''}`);
    showToast('Access revoked.','ok');rUsers();
  }catch(err){showToast('Failed: '+friendlySbError(err),'error')}
}

        <div class="fg"><label class="req">Session</label><select id="fs-sess">${SESSIONS.map(s=>`<option value="${s}" ${(fs.session||se.currentSession)===s?'selected':''}>${s}</option>`).join('')}</select></div>

      </div>
      <div class="fg"><label>Full Course — Both Years (₹)</label><input type="number" id="fs-full" value="${fs.fullCourseFee||''}" min="0" step="100"><p class="hint">For a student paying for the whole course in one go instead of year-by-year.</p></div>
      <div id="fs-err" class="alert a-err" style="display:none"></div>

}

async function svFeeStructure(idx){
  const course=e('fs-crs').value,session=e('fs-sess').value;
  const y1=parseFloat(e('fs-y1').value)||0,y2=parseFloat(e('fs-y2').value)||0,full=parseFloat(e('fs-full').value)||0;
  const er=e('fs-err');er.style.display='none';
  if(!y1&&!y2&&!full){er.textContent='Please enter at least one fee amount.';er.style.display='flex';return}
  const se=gSe();const list=(se.feeStructures||[]).slice();
  const dupIdx=list.findIndex((x,i)=>x.course===course&&x.session===session&&i!==idx);
  if(dupIdx>-1){er.textContent='A fee structure for this Course + Session already exists — edit that one instead.';er.style.display='flex';return}
  const entry={course,session,year1Fee:y1,year2Fee:y2,fullCourseFee:full};
  if(idx!==null&&idx>=0&&idx<list.length)list[idx]=entry;else list.push(entry);
  setBusy('fs-save-btn',true);
  try{
    await dbSaveSettings(Object.assign({},se,{feeStructures:list}));
    addLog('FEE_STRUCT',`${idx!==null?'Updated':'Added'} fee structure for ${course} · ${session}`);
    showToast('Fee structure saved.','ok');closeM();rSettings();
  }catch(err){setBusy('fs-save-btn',false);er.textContent=friendlySbError(err);er.style.display='flex'}
}

async function delFeeStructure(idx){
  const ok=await askConfirm({title:'Delete Fee Structure',danger:true,confirmLabel:'Delete',message:'Remove this fee structure? Students already added keep whatever fee they were given — this only stops it being suggested for new students going forward.'});
  if(!ok)return;
  const se=gSe();const list=(se.feeStructures||[]).filter((_,i)=>i!==idx);
  try{
    await dbSaveSettings(Object.assign({},se,{feeStructures:list}));
    showToast('Fee structure removed.','ok');rSettings();
  }catch(err){showToast('Failed: '+friendlySbError(err),'error')}
}

function doBackup(){
  const bk={v:'2.0',ts:new Date().toISOString(),students:gSt(),payments:gPy(),settings:gSe()};
  const b=new Blob([JSON.stringify(bk,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`college_backup_${today()}.json`;a.click();URL.revokeObjectURL(u);
  addLog('BACKUP','Data backup downloaded');showToast('Backup downloaded.','ok');
}

async function doRestore(inp){
  const f=inp.files[0];if(!f)return;
  const ok=await askConfirm({title:'Restore Backup',danger:true,confirmLabel:'Restore',message:'Restoring will REPLACE all current students, payments and settings in your connected database. This cannot be undone. Are you absolutely sure?',requireText:'RESTORE'});
  if(!ok){inp.value='';return}
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.students)await bulkUpsert('students',d.students,STU_MAP);
      if(d.payments)await bulkUpsert('payments',d.payments,PAY_MAP);
      if(d.settings)await dbSaveSettings(d.settings);
      await loadAllData();
      addLog('RESTORE','Data restored from backup');
      showToast('Data restored! Reloading...','ok');
      setTimeout(()=>location.reload(),1200);
    }catch(err){showToast('Invalid backup file or restore error: '+(err.message||err),'error')}
  };
  r.readAsText(f);
}

  const s2=['STU002','ADM2024002','Priya Sharma','Suresh Sharma','Meena Sharma','9898989898','Ward No. 5, Town Z, State – 000001','B.Ed','2024-2025','1st Year','OBC','2024-07-02','50000','2000','Active'];

function handleDrop(ev){const f=ev.dataTransfer.files[0];if(f&&f.name.endsWith('.csv'))procCSV(f);else showToast('Please drop a .csv file.','error')}
function handleCSV(inp){if(inp.files[0])procCSV(inp.files[0])}

function procCSV(f){
  const r=new FileReader();r.onload=ev=>{
    const lines=ev.target.result.split('\n').map(l=>l.trim()).filter(Boolean);
    if(lines.length<2){showToast('CSV must have at least header row + 1 data row.','error');return}
    const hdrs=lines[0].split(',').map(h=>h.replace(/"/g,'').trim().toLowerCase());
    const rows=lines.slice(1).map(ln=>{const vals=parseCSVLn(ln);const o={};hdrs.forEach((h,i)=>o[h]=(vals[i]||'').trim());return o}).filter(r=>r.full_name);
    showCSVPrev(rows);
  };r.readAsText(f);
}

function parseCSVLn(ln){const res=[];let cur='',q=false;for(let i=0;i<ln.length;i++){const c=ln[i];if(c==='"')q=!q;else if(c===','&&!q){res.push(cur);cur=''}else cur+=c}res.push(cur);return res}

function showCSVPrev(rows){
  const ex=gSt();const exIds=new Set(ex.map(s=>s.id));const exAd=new Set(ex.map(s=>s.admissionNo).filter(Boolean));
  const annotated=rows.map(r=>{const dup=exIds.has(r.student_id)||(r.admission_no&&exAd.has(r.admission_no));return Object.assign({},r,{_dup:dup})});
  const good=annotated.filter(r=>!r._dup).length;
  const pRows=annotated.slice(0,12).map(r=>`<tr ${r._dup?'style="background:#fff1f2"':''}>
    <td>${r._dup?'<span class="badge b-err">SKIP</span>':'<span class="badge b-ok">OK</span>'}</td>
    <td>${esc(r.student_id||'-')}</td><td>${esc(r.full_name||'-')}</td>
    <td>${esc(r.father_name||'-')}</td><td>${esc(r.mobile||'-')}</td>
    <td>${esc(r.course||'-')}</td><td>${esc(r.session||'-')}</td>
    <td>${esc(r.total_fees||'-')}</td>
  </tr>`).join('');
  window._csvRows=annotated;
  e('csv-prev').innerHTML=`
  <div class="card">
    <div class="ch"><span class="ct">Preview — ${annotated.length} rows found, ${good} will be imported</span></div>
    ${annotated.some(r=>r._dup)?`<div class="alert a-warn" style="margin:12px 12px 0">${icon('alert',15)}<span>Rows marked SKIP already exist (duplicate ID or admission number).</span></div>`:''}
    <div class="tw"><table><thead><tr><th>Status</th><th>Student ID</th><th>Name</th><th>Father</th><th>Mobile</th><th>Course</th><th>Session</th><th>Fees</th></tr></thead><tbody>${pRows}</tbody></table></div>
    ${annotated.length>12?`<div style="padding:8px 14px;font-size:.78rem;color:var(--muted)">... and ${annotated.length-12} more rows</div>`:''}
    <div style="padding:12px 14px;display:flex;justify-content:flex-end;gap:10px">
      <button class="btn bo" onclick="e('csv-prev').innerHTML=''">Cancel</button>
      <button class="btn bp" id="import-btn" onclick="doImport()">${icon('check',15)} Import ${good} Students</button>
    </div>
  </div>`;
}

async function doImport(){
  const rows=window._csvRows||[];const se=gSe();
  const ex=gSt();const exIds=new Set(ex.map(s=>s.id));const exAd=new Set(ex.map(s=>s.admissionNo).filter(Boolean));
  let allIds=ex.map(s=>s.id); // grows as we assign new ids within this batch, so auto-generated ids never collide with each other
  const yrPfx='STU'+(se.currentSession||'2024-2025').split('-')[0].slice(-2);
  let added=0,skipped=0;const toAdd=[];
  rows.forEach(r=>{
    if(r._dup){skipped++;return}
    let id=(r.student_id||'').trim();
    if(!id)id=yrPfx+String(seqFromIds(allIds,yrPfx)).padStart(3,'0');
    if(exIds.has(id)){skipped++;return}
    if(r.admission_no&&exAd.has(r.admission_no)){skipped++;return}
    toAdd.push({id,admissionNo:r.admission_no||'',name:r.full_name||'',fatherName:r.father_name||'',motherName:r.mother_name||'',mobile:r.mobile||'',address:r.address||'',course:r.course||'B.Ed',session:r.session||se.currentSession,year:r.year||'1st Year',category:r.category||'General',dateOfAdmission:r.date_of_admission||today(),totalFees:parseFloat(r.total_fees)||0,discount:parseFloat(r.discount)||0,status:r.status||'Active',photo:null,createdAt:new Date().toISOString()});
    exIds.add(id);allIds.push(id);if(r.admission_no)exAd.add(r.admission_no);added++;
  });
  setBusy('import-btn',true,'Importing...');
  try{
    await dbBulkAddStudents(toAdd);
    addLog('BULK_IMP',`Imported ${added}, skipped ${skipped}`);
    showToast(`Import complete — added ${added}, skipped ${skipped} duplicate(s).`,'ok',5000);
    nav('students');
  }catch(err){setBusy('import-btn',false);showToast('Import failed: '+friendlySbError(err),'error')}
}

function showSetupNeeded(msg){
  e('login-fields').style.display='none';
  e('setup-needed').style.display='block';
  e('setup-needed-msg').textContent=msg;
}

async function boot(){
  const bl=e('boot-loader');
  if(SUPABASE_URL.indexOf('YOUR_SUPABASE')===0||SUPABASE_ANON_KEY.indexOf('YOUR_SUPABASE')===0){
    if(bl)bl.style.display='none';
    showSetupNeeded('This app hasn\'t been connected to a database yet. Open this file in a text editor, fill in SUPABASE_URL and SUPABASE_ANON_KEY near the top of the code with your Supabase project\'s values, save, and reopen it.');
    e('login-page').style.display='flex';
    return;
  }
  try{
    const ok=await tryInitSupabase();
    if(!ok){
      if(bl)bl.style.display='none';
      showSetupNeeded(SB_LAST_ERROR||'Could not connect to the database. Check your internet connection.');
      e('login-page').style.display='flex';
      return;
    }
    const hasSession=await checkExistingSession();
    if(bl)bl.style.display='none';
    if(hasSession){showApp();return}
    e('login-page').style.display='flex';
  }catch(err){
    console.error('Boot error',err);
    if(bl)bl.style.display='none';
    showSetupNeeded(friendlySbError(err));
    e('login-page').style.display='flex';
  }
  if(window.innerWidth<768){const b=e('mnu-btn');if(b)b.style.display='flex'}
}
boot();
